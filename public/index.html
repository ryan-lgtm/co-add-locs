<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorado Sucks. Let's Add Locations.</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-anim"></div>
    <main class="glass-panel">
        <header>
            <h1>Colorado Sucks.</h1>
            <p class="subtitle">Let's Add Locations.</p>
            <p class="desc">Automated bulk location adder for CO SUTS</p>
        </header>

        <form id="runner-form">
            <div id="step-1-section">
                <div class="credentials-section">
                    <div class="input-group">
                        <label for="username">SUTS Username</label>
                        <input type="email" id="username" placeholder="user@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">SUTS Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="start-date">First transaction start date (MM/DD/YYYY)</label>
                    <input type="text" id="start-date" placeholder="01/01/2025" required>
                </div>

                <button type="submit" id="start-btn" class="glow-button">Start Login Automation</button>
            </div>
            
            <div id="step-2-section" style="display: none; margin-top: 2rem;">
                <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
                    <p style="margin-bottom: 1rem; font-weight: 600;">Are you looking at the correct account's Dashboard in the newly opened browser?</p>
                    <button type="button" id="confirm-dashboard-btn" class="glow-button" style="margin-top: 0; padding: 0.75rem 2rem;">Yes</button>
                </div>
                
                <div id="locations-section" class="input-group parse-section" style="display: none;">
                    <label for="locations">Locations (Paste names, codes, comma or line separated)</label>
                    <textarea id="locations" rows="6" placeholder="Denver, 04-0017&#10;Boulder, 10006..."></textarea>
                    
                    <div class="parsed-preview" id="parsed-preview" style="display: none;">
                        <span id="parsed-count">0</span> jurisdictions detected.
                    </div>
                    
                    <button type="button" id="run-locations-btn" class="glow-button">Start Adding Locations</button>
                </div>
            </div>
        </form>

        <div class="terminal-section" id="terminal-section" style="display: none;">
            <div class="terminal-header">
                <span>Execution Log</span>
                <span class="status-indicator"></span>
            </div>
            <div class="terminal-content" id="terminal-content">
                <!-- Logs appear here -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
